services:
  ollama:
    image: ollama/ollama:latest
    container_name: christopher-ollama
    networks:
      - christopher-net
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_KEEP_ALIVE=-1
    restart: unless-stopped
    command: serve

  app:
    build: .
    container_name: christopher-app
    networks:
      - christopher-net
    expose:
      - "3000"
    environment:
      - OLLAMA_HOST=http://christopher-ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: christopher-caddy
    networks:
      - christopher-net
    depends_on:
      - app
    ports:
      - "0.0.0.0:3001:443"
      - "0.0.0.0:3002:80"
    environment:
      - HOST_IP=${HOST_IP:-127.0.0.1}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

networks:
  christopher-net:
    driver: bridge

volumes:
  ollama_data:
  caddy_data:
  caddy_config:
